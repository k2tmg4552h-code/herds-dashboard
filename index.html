<!DOCTYPE html>
<html>
<head>
    <title>Herds Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: Arial; text-align: center; margin: 0; overflow: hidden; padding: 20px; }
        #top-bar { display: flex; justify-content: space-between; max-width: 1200px; margin: 0 auto 20px; }
        #search-box { padding: 10px; border-radius: 20px; border: 1px solid #89CFF0; background: #111; color: white; width: 250px; }
        .toggle-btn { background: #222; color: white; border: 1px solid #555; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .toggle-btn.active { background: #89CFF0; color: black; }
        #universe { position: relative; width: 100%; height: 650px; border: 1px solid #222; border-radius: 10px; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }
        #camera { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
        #data-vault { display: none; width: 100%; height: 650px; overflow-y: auto; background: #111; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #333; }
        .bubble { color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; position: absolute; transform: translate(-50%, -50%); cursor: pointer; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        #panel { display: none; position: fixed; right: 0; top: 0; width: 300px; height: 100%; background: #111; border-left: 2px solid #89CFF0; padding: 20px; z-index: 2000; text-align: left; }
        #chart-container { width: 100%; height: 120px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>HERDS.</h1>
    <div id="top-bar">
        <input type="text" id="search-box" placeholder="Search products..." onkeyup="buildTable()">
        <div>
            <button id="btn-map" class="toggle-btn active" onclick="switchView('map')">MAP</button>
            <button id="btn-vault" class="toggle-btn" onclick="switchView('vault')">VAULT</button>
        </div>
    </div>
    <div id="universe"><div id="camera"></div></div>
    <div id="data-vault"><table id="vault-table"><thead><tr><th>Name</th><th>Category</th><th>Score</th></tr></thead><tbody id="vault-body"></tbody></table></div>
    <div id="panel">
        <span onclick="this.parentElement.style.display='none'" style="cursor:pointer;color:gray;">[X] CLOSE</span>
        <h2 id="p-title" style="color:#89CFF0;font-size:16px;"></h2>
        <p>Score: <b id="p-score"></b></p>
        <div id="chart-container"></div>
    </div>
    <script>
        const ws = new WebSocket((window.location.protocol==="https:"?"wss://":"ws://")+window.location.host+"/ws");
        let latestData = { items: [] }, currentNodes = [], selectedName = null;
        const camera = document.getElementById('camera'), vault = document.getElementById('data-vault'), universe = document.getElementById('universe');

        let sim = d3.forceSimulation().force("charge", d3.forceManyBody().strength(-150)).force("x", d3.forceX(window.innerWidth/2).strength(0.02)).force("y", d3.forceY(325).strength(0.02)).force("collide", d3.forceCollide().radius(d => d.r + 10));

        ws.onmessage = e => {
            latestData = JSON.parse(e.data);
            drawMap(); buildTable();
            if (selectedName) { let i = latestData.items.find(x => x.name === selectedName); if (i) drawChart(i.history); }
        };

        function switchView(v) {
            universe.style.display = v==='map'?'block':'none'; vault.style.display = v==='vault'?'block':'none';
            document.getElementById('btn-map').className = v==='map'?'toggle-btn active':'toggle-btn';
            document.getElementById('btn-vault').className = v==='vault'?'toggle-btn active':'toggle-btn';
        }

        function drawMap() {
            let items = latestData.items.slice(0, 25);
            const maxS = items[0]?.score || 1;
            currentNodes = items.map((d, i) => {
                let old = currentNodes.find(n => n.id === d.name);
                return { id: d.name, item: d, r: Math.max(25, (d.score/maxS)*100), x: old?.x || 500, y: old?.y || 300 };
            });
            d3.selectAll('.bubble').remove();
            currentNodes.forEach(n => {
                let b = document.createElement('div'); b.className = 'bubble';
                b.style.width = b.style.height = (n.r*2)+'px';
                b.style.background = n.item.category==='tech'?'#00e5ff':'#ff8c00';
                b.innerHTML = `<span style="font-size:10px;padding:5px;">${n.id}</span>`;
                b.title = n.item.full_name; // HOVER FIX
                b.onclick = () => {
                    document.getElementById('panel').style.display='block';
                    document.getElementById('p-title').innerText = n.item.full_name;
                    document.getElementById('p-score').innerText = n.item.score;
                    selectedName = n.id; drawChart(n.item.history);
                };
                camera.appendChild(b);
            });
            sim.nodes(currentNodes).on("tick", () => {
                currentNodes.forEach(n => {
                    let b = document.getElementById('bubble-'+n.id.replace(/\W/g,'-'));
                    let el = Array.from(document.getElementsByClassName('bubble')).find(x => x.title === n.item.full_name);
                    if(el) { el.style.left = n.x+'px'; el.style.top = n.y+'px'; }
                });
            }).alpha(1).restart();
        }

        function buildTable() {
            let f = document.getElementById('search-box').value.toLowerCase();
            document.getElementById('vault-body').innerHTML = latestData.items.filter(x => x.full_name.toLowerCase().includes(f)).map(x => 
                `<tr onclick="showItem('${x.name}')"><td>${x.name}</td><td>${x.category}</td><td>${x.score}</td></tr>`).join('');
        }

        function showItem(name) {
            let i = latestData.items.find(x => x.name === name);
            if(i) {
                document.getElementById('panel').style.display='block';
                document.getElementById('p-title').innerText = i.full_name;
                document.getElementById('p-score').innerText = i.score;
                selectedName = i.name; drawChart(i.history);
            }
        }

        function drawChart(h) {
            const c = document.getElementById('chart-container'); c.innerHTML = "";
            const w = c.clientWidth, hgt = c.clientHeight;
            const svg = d3.select('#chart-container').append('svg').attr('width',w).attr('height',hgt);
            const x = d3.scaleLinear().domain([0, h.length-1]).range([0, w]);
            const y = d3.scaleLinear().domain([d3.min(h)*0.9, d3.max(h)*1.1]).range([hgt, 0]);
            svg.append('path').datum(h).attr('fill','none').attr('stroke','#89CFF0').attr('stroke-width',2).attr('d', d3.line().x((d,i)=>x(i)).y(d=>y(d)));
        }
    </script>
</body>
</html>
